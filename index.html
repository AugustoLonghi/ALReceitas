<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas de Pizza</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>🍕 Pizzaria Lab</h1>
        
        <div class="form-group">
            <label for="receita">Receita:</label>
            <select id="receita" onchange="atualizarTipos()">
                <option value="pizza">Massa</option>
                <option value="molho">Molho</option>
				<option value="cobertura">Cobertura</option>
            </select>
        </div>

        <div class="form-group">
            <label for="tipo">Tipo:</label>
            <select id="tipo">
                <!-- Opções serão inseridas pelo JS -->
            </select>
        </div>

        <div class="form-group">
            <label for="tamanho">Tamanho:</label>
            <select id="tamanho">
                <option value="25">25cm (Broto)</option>
                <option value="35">35cm (Grande)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quantidade">Quantidade:</label>
            <input type="number" id="quantidade" value="1" min="1">
        </div>

        <button onclick="calcular()">Calcular Agora</button>

        <div id="resultado" class="result-area" style="display: none;">
            <h2 id="titulo-resultado">Ingredientes:</h2>
            <ul id="lista-ingredientes"></ul>
		
		    <div class="prep-box">
				<strong>Modo de Preparo:</strong>
			<div id="texto-preparo"></div>
			</div>
            
            <div id="info-tecnica" class="note-box">
                <strong>Dica do Chef:</strong>
                <p id="texto-nota"></p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
